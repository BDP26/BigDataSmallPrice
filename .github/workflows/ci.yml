name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install \
            httpx \
            psycopg2-binary \
            pandas \
            pyarrow \
            fastapi \
            uvicorn \
            python-multipart \
            scikit-learn \
            "xgboost>=2.0" \
            "PyJWT>=2.8" \
            joblib \
            pytest \
            pytest-mock \
            responses \
            ruff

      - name: Lint with ruff
        run: |
          ruff check src/ --ignore E501,S608

      - name: Run unit tests
        env:
          BDSP_DB_PASSWORD: "test"
        run: |
          python -m pytest src/testing/unittests/ -v --tb=short
