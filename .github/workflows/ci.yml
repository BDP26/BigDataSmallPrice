name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-mock responses ruff  # Test-Tools separat

      - name: Lint with ruff
        run: |
          ruff check src/ --ignore E501,S608

      - name: Run unit tests
        env:
          BDSP_DB_PASSWORD: "test"
        run: |
          python -m pytest src/testing/unittests/ -v --tb=short
