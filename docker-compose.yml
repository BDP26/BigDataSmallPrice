x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    ENTSOE_API_TOKEN: ${ENTSOE_API_TOKEN}
    BDSP_DB_HOST: timescaledb
    BDSP_DB_PORT: 5432
    BDSP_DB_NAME: bdsp
    BDSP_DB_USER: bdsp
    BDSP_DB_PASSWORD: ${BDSP_DB_PASSWORD}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
    - ./models:/opt/airflow/models
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            device_ids: ["0"]   # RTX 3080 – dediziert für ML-Training
            capabilities: [gpu]
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_DB_USER}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: bdsp
      POSTGRES_PASSWORD: ${BDSP_DB_PASSWORD}
      POSTGRES_DB: bdsp
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "bdsp"]
      interval: 10s
      retries: 5
      start_period: 10s
    restart: always

  db-migrate:
    image: timescale/timescaledb:latest-pg15
    command: >
      psql -h timescaledb -U bdsp -d bdsp -f /init.sql
    environment:
      PGPASSWORD: ${BDSP_DB_PASSWORD}
    volumes:
      - ./infra/db/init.sql:/init.sql
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: "no"

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username "$$AIRFLOW_ADMIN_USER" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email "$$AIRFLOW_ADMIN_EMAIL" \
          --password "$$AIRFLOW_ADMIN_PASSWORD" &&
        airflow pools set entsoe_pool 1 "Max 1 concurrent ENTSO-E task (token block protection)" &&
        airflow pools set tariff_pool 2 "Max 2 concurrent tariff API tasks" &&
        airflow pools set meteo_pool  3 "Max 3 concurrent Open-Meteo tasks" &&
        airflow pools set bafu_pool   1 "Max 1 concurrent BAFU task"
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL}
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: bash -c "rm -f /opt/airflow/airflow-webserver.pid && airflow webserver"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  api:
    build: ./src/api
    pull_policy: build
    ports:
      - "8001:8000"
    volumes:
      - ./src/frontend/static:/app/static:ro
      - ./src:/app/src:ro
      - ./models:/app/models:ro
      - ./data:/app/data:ro
    environment:
      BDSP_DB_HOST: timescaledb
      BDSP_DB_PORT: 5432
      BDSP_DB_NAME: bdsp
      BDSP_DB_USER: bdsp
      BDSP_DB_PASSWORD: ${BDSP_DB_PASSWORD}
      BDSP_JWT_SECRET: ${BDSP_JWT_SECRET}
      BDSP_STATIC_DIR: /app/static
      BDSP_MODELS_DIR: /app/models
      BDSP_ENERGY_EXPORT_DIR: /app/data/energy
      BDSP_LOAD_EXPORT_DIR: /app/data/load
      AIRFLOW_API_URL:      http://airflow-webserver:8080
      AIRFLOW_API_USER:     ${AIRFLOW_ADMIN_USER}
      AIRFLOW_API_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
    depends_on:
      timescaledb:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  timescale_data:
